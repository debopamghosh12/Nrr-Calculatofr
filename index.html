<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Tournament NRR Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0d2e27;
            --bg-mid: #145445;
            --card: #f7f9f8;
            --card-dark: #102f29;
            --ink: #15201c;
            --ink-soft: #5b6a64;
            --accent: #8ee845;
            --accent-2: #53cc6f;
            --danger: #d13049;
            --line: #dce5e0;
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --shadow: 0 18px 40px rgba(6, 27, 21, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Barlow", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 20% 0%, rgba(142, 232, 69, 0.2), transparent 32%),
                radial-gradient(circle at 90% 10%, rgba(83, 204, 111, 0.18), transparent 25%),
                linear-gradient(145deg, var(--bg-deep), var(--bg-mid));
            padding: 24px 14px;
        }

        .app {
            max-width: 1100px;
            margin: 0 auto;
            border-radius: 28px;
            overflow: hidden;
            background: linear-gradient(180deg, #f4f7f6 0%, #f8faf9 100%);
            box-shadow: var(--shadow);
        }

        .topbar {
            background:
                linear-gradient(0deg, rgba(16, 47, 41, 0.95), rgba(16, 47, 41, 0.95)),
                repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.04) 1px, transparent 1px, transparent 18px);
            color: #e8f5ee;
            padding: 20px 20px 16px;
        }

        .top-row,
        .user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: "Rajdhani", sans-serif;
            letter-spacing: 0.6px;
            font-size: 2rem;
            margin: 0;
            color: #f0fff7;
        }

        .logo span {
            color: var(--accent);
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.14);
            color: #fff;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 1rem;
        }

        .user-row {
            margin-top: 10px;
            color: #ddede6;
        }

        .user-row strong {
            color: #ffffff;
        }

        .content {
            padding: 16px;
        }

        .tabs {
            display: flex;
            gap: 18px;
            overflow-x: auto;
            margin-bottom: 14px;
            padding-bottom: 4px;
        }

        .tab {
            white-space: nowrap;
            color: #657670;
            font-weight: 600;
            font-size: 0.95rem;
            padding-bottom: 6px;
            border-bottom: 3px solid transparent;
            cursor: pointer;
        }

        .tab.active {
            color: var(--ink);
            border-bottom-color: var(--accent-2);
        }

        .hero {
            border-radius: var(--radius-lg);
            padding: 16px;
            color: #fff;
            background:
                linear-gradient(145deg, rgba(17, 61, 52, 0.95), rgba(15, 46, 40, 0.95)),
                radial-gradient(circle at 80% 10%, rgba(142, 232, 69, 0.24), transparent 45%);
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
            animation: floatIn 560ms ease;
        }

        .hero::after {
            content: "";
            position: absolute;
            width: 220px;
            height: 220px;
            right: -75px;
            top: -100px;
            border-radius: 50%;
            background: rgba(142, 232, 69, 0.18);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 0.75rem;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.14);
        }

        .hero h2 {
            margin: 10px 0 6px;
            font-size: 1.3rem;
        }

        .hero p {
            margin: 0;
            color: #cfe3da;
        }

        .card-grid {
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            margin-bottom: 16px;
        }

        .stats-strip {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }

        .stat-pill {
            border-radius: var(--radius-md);
            background: #ffffff;
            border: 1px solid var(--line);
            padding: 10px;
            text-align: center;
        }

        .stat-pill .value {
            display: block;
            font-weight: 700;
            font-size: 1.15rem;
            color: #1f5a47;
        }

        .stat-pill .label {
            display: block;
            color: #5c6d66;
            font-size: 0.78rem;
        }

        .mini-card {
            border-radius: var(--radius-md);
            background: #ffffff;
            border: 1px solid var(--line);
            padding: 12px;
            animation: floatIn 500ms ease;
        }

        .mini-card h3 {
            margin: 0 0 10px;
            font-size: 1rem;
            color: #30403a;
        }

        .empty-item {
            color: #8b9a94;
            font-size: 0.88rem;
            padding: 8px 0;
        }

        .fixture {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-top: 1px dashed #e3ebe7;
            font-size: 0.95rem;
        }

        .fixture:first-of-type {
            border-top: 0;
            padding-top: 0;
        }

        .fixture .state {
            font-size: 0.72rem;
            font-weight: 700;
            color: #fff;
            background: var(--danger);
            padding: 3px 8px;
            border-radius: 999px;
        }

        .nrr-section {
            border-radius: var(--radius-lg);
            background: #ffffff;
            border: 1px solid var(--line);
            padding: 16px;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .section-head h2 {
            margin: 0;
            font-family: "Rajdhani", sans-serif;
            letter-spacing: 0.3px;
            font-size: 1.4rem;
        }

        .controls {
            border-radius: var(--radius-md);
            border: 1px solid var(--line);
            padding: 12px;
            margin-bottom: 14px;
            background: #f8faf9;
        }

        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .control-row label {
            margin: 0;
            font-weight: 700;
            color: #29453c;
        }

        .control-row select {
            min-width: 120px;
            border-radius: var(--radius-sm);
            border: 1px solid #c6d8cf;
            padding: 8px;
            background: #fff;
            font-weight: 700;
            color: #1f3f35;
        }

        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 12px;
            margin-bottom: 14px;
        }

        .match-card {
            border-radius: var(--radius-md);
            border: 1px solid var(--line);
            padding: 12px;
            background: #fcfdfd;
            animation: floatIn 420ms ease;
        }

        .match-card h3 {
            margin: 0 0 8px;
            font-family: "Rajdhani", sans-serif;
            letter-spacing: 0.2px;
            font-size: 1.1rem;
        }

        .split-title {
            font-weight: 700;
            margin: 8px 0 4px;
            color: #3a4f47;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        label {
            display: block;
            margin: 8px 0 4px;
            font-size: 0.86rem;
            color: var(--ink-soft);
            font-weight: 600;
        }

        input {
            width: 100%;
            border: 1px solid #cedad4;
            border-radius: var(--radius-sm);
            padding: 8px;
            font-size: 0.92rem;
            outline: none;
            transition: border-color 180ms ease, box-shadow 180ms ease;
        }

        input:focus,
        select:focus {
            border-color: #50b879;
            box-shadow: 0 0 0 3px rgba(80, 184, 121, 0.18);
        }

        .calc-btn {
            width: 100%;
            border: 0;
            border-radius: 10px;
            padding: 12px;
            font-size: 1rem;
            font-weight: 700;
            color: #143126;
            background: linear-gradient(90deg, var(--accent), #caf849);
            cursor: pointer;
            margin-bottom: 14px;
            transition: transform 160ms ease;
        }

        .calc-btn:hover {
            transform: translateY(-1px);
        }

        .results {
            border-radius: var(--radius-md);
            background: linear-gradient(180deg, #f0fff6 0%, #ecfff4 100%);
            border: 1px solid #c6e9d4;
            padding: 14px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            font-size: 0.98rem;
        }

        .result-item span {
            font-weight: 700;
            color: #0f4f37;
        }

        .results hr {
            border: 0;
            border-top: 1px dashed #b2dcc2;
            margin: 10px 0;
        }


        .bottom-nav {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            background: #ffffff;
            border-top: 1px solid #dfebe5;
            padding: 10px 12px 14px;
        }

        .nav-item {
            text-align: center;
            color: #60706b;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .nav-item.active {
            color: #2b6a55;
        }

        .nav-item .dot {
            display: block;
            width: 8px;
            height: 8px;
            margin: 0 auto 5px;
            border-radius: 50%;
            background: #d2ddd8;
        }

        .nav-item.active .dot {
            background: var(--accent-2);
        }

        @keyframes floatIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 700px) {
            .app {
                border-radius: 18px;
            }

            .section-head {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <main class="app">
        <header class="topbar">
            <div class="top-row">
                <button class="icon-btn" type="button" aria-label="Open menu">☰</button>
                <h1 class="logo">Hostel Prem<span>ier League 2026</span></h1>
                <button class="icon-btn" type="button" aria-label="Search">⌕</button>
            </div>
            <div class="user-row">
                <div>Good Morning, <strong>Captain</strong></div>
                <div>NRR Desk</div>
            </div>
        </header>

        <div class="content">
            <nav class="tabs" aria-label="Tournament sections">
                <div class="tab active" onclick="navigateTo('index.html')">Overview</div>
                <div class="tab" onclick="navigateTo('nrr.html')">NRR Calculator</div>
                <div class="tab" onclick="navigateTo('index.html')">Matches</div>
                <div class="tab" onclick="navigateTo('points.html')">Points Table</div>
                <div class="tab" onclick="navigateTo('index.html')">Team Squads</div>
            </nav>

            <section class="hero">
                <span class="badge" id="hero-badge">LIVE</span>
                <h2 id="hero-title">Hostel Premier League 2026</h2>
                <p id="hero-description">Track fixtures and estimate your NRR impact match-by-match.</p>
            </section>

            <section class="stats-strip" id="stats-strip"></section>

            <section class="card-grid">
                <article class="mini-card">
                    <h3>Fixtures</h3>
                    <div id="fixture-list"></div>
                </article>
                <article class="mini-card">
                    <h3>Previous Results</h3>
                    <div id="result-list"></div>
                </article>
            </section>


        </div>

        <footer class="bottom-nav">
            <div class="nav-item active"><span class="dot"></span>Home</div>
            <div class="nav-item"><span class="dot"></span>Live</div>
            <div class="nav-item"><span class="dot"></span>Series</div>
            <div class="nav-item"><span class="dot"></span>Shorts</div>
            <div class="nav-item"><span class="dot"></span>More</div>
        </footer>
    </main>

    <script>
        const heroTitle = document.getElementById('hero-title');
        const heroBadge = document.getElementById('hero-badge');
        const heroDescription = document.getElementById('hero-description');
        const fixtureList = document.getElementById('fixture-list');
        const resultList = document.getElementById('result-list');
        const statsStrip = document.getElementById('stats-strip');

        function navigateTo(path) {
            window.location.href = path;
        }

        const tournamentState = {
            tournamentName: 'Hostel Premier League 2026',
            badgeText: 'LIVE',
            description: 'Track fixtures and estimate your NRR impact match-by-match.',
            fixtures: [],
            results: [],
            stats: []
        };

        function renderTournamentDisplay() {
            heroTitle.textContent = tournamentState.tournamentName;
            heroBadge.textContent = tournamentState.badgeText;
            heroDescription.textContent = tournamentState.description;
            document.title = `${tournamentState.tournamentName} NRR Hub`;

            statsStrip.innerHTML = tournamentState.stats.length
                ? tournamentState.stats.map((item) => `
                    <article class="stat-pill">
                        <span class="value">${item.value}</span>
                        <span class="label">${item.label}</span>
                    </article>
                `).join('')
                : '<div class="empty-item">No stats added yet.</div>';

            fixtureList.innerHTML = tournamentState.fixtures.length
                ? tournamentState.fixtures.map((item) => `
                    <div class="fixture">
                        <span>${item.teamA} vs ${item.teamB}</span>
                        <span class="state">${item.state}</span>
                    </div>
                `).join('')
                : '<div class="empty-item">No fixtures added yet.</div>';

            resultList.innerHTML = tournamentState.results.length
                ? tournamentState.results.map((item) => `
                    <div class="fixture">
                        <span>${item.summary}</span>
                        <strong>${item.outcome}</strong>
                    </div>
                `).join('')
                : '<div class="empty-item">No results added yet.</div>';
        }

        async function loadTournamentData() {
            try {
                const response = await fetch('/api/tournament-data');
                const data = await response.json();

                Object.assign(tournamentState, {
                    tournamentName: data.tournamentName || tournamentState.tournamentName,
                    badgeText: data.badgeText || tournamentState.badgeText,
                    description: data.description || tournamentState.description,
                    fixtures: Array.isArray(data.fixtures) ? data.fixtures : [],
                    results: Array.isArray(data.results) ? data.results : [],
                    stats: Array.isArray(data.stats) ? data.stats : []
                });
            } catch (_error) {
                // If server data is unavailable, keep defaults.
            }

            renderTournamentDisplay();
        }


        loadTournamentData();
    </script>
</body>
</html>
