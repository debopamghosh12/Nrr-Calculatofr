<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Points Table</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0d2e27;
            --bg-mid: #145445;
            --ink: #15201c;
            --accent: #8ee845;
            --accent-2: #53cc6f;
            --line: #dce5e0;
            --radius-lg: 18px;
            --radius-md: 12px;
            --shadow: 0 18px 40px rgba(6, 27, 21, 0.18);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Barlow", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 20% 0%, rgba(142, 232, 69, 0.2), transparent 32%),
                radial-gradient(circle at 90% 10%, rgba(83, 204, 111, 0.18), transparent 25%),
                linear-gradient(145deg, var(--bg-deep), var(--bg-mid));
            padding: 24px 14px;
        }

        .app {
            max-width: 1100px;
            margin: 0 auto;
            border-radius: 28px;
            overflow: hidden;
            background: linear-gradient(180deg, #f4f7f6 0%, #f8faf9 100%);
            box-shadow: var(--shadow);
        }

        .topbar {
            background:
                linear-gradient(0deg, rgba(16, 47, 41, 0.95), rgba(16, 47, 41, 0.95)),
                repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.04) 1px, transparent 1px, transparent 18px);
            color: #e8f5ee;
            padding: 20px 20px 16px;
        }

        .top-row,
        .user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: "Rajdhani", sans-serif;
            letter-spacing: 0.6px;
            font-size: 2rem;
            margin: 0;
            color: #f0fff7;
        }

        .logo span { color: var(--accent); }

        .icon-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.14);
            color: #fff;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 1rem;
        }

        .user-row { margin-top: 10px; color: #ddede6; }
        .user-row strong { color: #ffffff; }

        .content { padding: 16px; }

        .tabs {
            display: flex;
            gap: 18px;
            overflow-x: auto;
            margin-bottom: 14px;
            padding-bottom: 4px;
        }

        .tab {
            white-space: nowrap;
            color: #657670;
            font-weight: 600;
            font-size: 0.95rem;
            padding-bottom: 6px;
            border-bottom: 3px solid transparent;
            cursor: pointer;
        }

        .tab.active {
            color: var(--ink);
            border-bottom-color: var(--accent-2);
        }

        .table-card {
            border-radius: var(--radius-lg);
            background: #ffffff;
            border: 1px solid var(--line);
            padding: 16px;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .section-head h2 {
            margin: 0;
            font-family: "Rajdhani", sans-serif;
            letter-spacing: 0.3px;
            font-size: 1.45rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 0.75rem;
            font-weight: 700;
            background: #eff7f3;
            color: #13543a;
        }

        .status {
            margin: 8px 0 14px;
            font-size: 0.9rem;
            color: #567169;
        }

        .status.error { color: #b2223b; }

        .table-wrap {
            overflow-x: auto;
            border: 1px solid #dce8e2;
            border-radius: var(--radius-md);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 860px;
            background: #fff;
        }

        thead th {
            text-align: left;
            font-size: 0.78rem;
            letter-spacing: 0.5px;
            color: #52645d;
            text-transform: uppercase;
            background: #f3f8f6;
            padding: 10px;
            border-bottom: 1px solid #dce8e2;
        }

        tbody td {
            padding: 10px;
            border-bottom: 1px solid #edf3f0;
            font-size: 0.92rem;
        }

        tbody tr:last-child td { border-bottom: 0; }

        .team-name {
            font-weight: 700;
            color: #1a3d31;
        }

        .pill {
            background: #eff7f3;
            color: #1d5f47;
            border-radius: 999px;
            padding: 2px 8px;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .refresh-btn {
            border: 0;
            border-radius: 9px;
            padding: 8px 12px;
            background: linear-gradient(90deg, var(--accent), #caf849);
            color: #123a2c;
            font-weight: 700;
            cursor: pointer;
        }

        .mode-select {
            border-radius: 8px;
            border: 1px solid #c6d8cf;
            padding: 7px 8px;
            font-weight: 700;
            color: #1f3f35;
            background: #fff;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <main class="app">
        <header class="topbar">
            <div class="top-row">
                <button class="icon-btn" type="button" aria-label="Open menu">☰</button>
                <h1 class="logo">Hostel Prem<span>ier League 2026</span></h1>
                <button class="icon-btn" type="button" aria-label="Search">⌕</button>
            </div>
            <div class="user-row">
                <div>Good Morning, <strong>Captain</strong></div>
                <div>NRR Desk</div>
            </div>
        </header>

        <div class="content">
            <nav class="tabs" aria-label="Tournament sections">
                <div class="tab" onclick="navigateTo('index.html')">Overview</div>
                <div class="tab" onclick="navigateTo('nrr.html')">NRR Calculator</div>
                <div class="tab active" onclick="navigateTo('points.html')">Points Table</div>
                <div class="tab" onclick="navigateTo('index.html')">Team Squads</div>
            </nav>

            <section class="table-card">
                <div class="section-head">
                    <h2>Points Table</h2>
                    <div>
                        <select id="runrate-mode" class="mode-select">
                            <option value="balls" selected>By Balls</option>
                            <option value="overs">By Overs</option>
                        </select>
                        <span id="basis-badge" class="badge">NRR Basis: Runs / Balls</span>
                        <button class="refresh-btn" type="button" onclick="loadPointsTable()">Refresh</button>
                    </div>
                </div>
                <p id="table-status" class="status">Loading points table from Neon...</p>

                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Team</th>
                                <th>P</th>
                                <th>W</th>
                                <th>L</th>
                                <th>T</th>
                                <th>NR</th>
                                <th>Pts</th>
                                <th>Runs For</th>
                                <th>Balls Faced</th>
                                <th>Runs Against</th>
                                <th>Balls Bowled</th>
                                <th id="nrr-col-head">NRR (Balls)</th>
                            </tr>
                        </thead>
                        <tbody id="points-body"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <script>
        const pointsBody = document.getElementById('points-body');
        const tableStatus = document.getElementById('table-status');
        const runrateModeSelect = document.getElementById('runrate-mode');
        const basisBadge = document.getElementById('basis-badge');
        const nrrColHead = document.getElementById('nrr-col-head');

        function navigateTo(path) {
            window.location.href = path;
        }

        function setStatus(message, isError = false) {
            tableStatus.textContent = message;
            tableStatus.className = isError ? 'status error' : 'status';
        }

        function renderRows(rows) {
            if (!rows.length) {
                pointsBody.innerHTML = '<tr><td colspan="13">No teams/matches found. Add matches from Admin panel.</td></tr>';
                return;
            }

            pointsBody.innerHTML = rows.map((row, idx) => `
                <tr>
                    <td><span class="pill">${idx + 1}</span></td>
                    <td class="team-name">${row.team_name}</td>
                    <td>${row.played}</td>
                    <td>${row.wins}</td>
                    <td>${row.losses}</td>
                    <td>${row.ties}</td>
                    <td>${row.no_results}</td>
                    <td><strong>${row.points}</strong></td>
                    <td>${row.runs_for}</td>
                    <td>${row.balls_faced}</td>
                    <td>${row.runs_against}</td>
                    <td>${row.balls_bowled}</td>
                    <td>${Number(row.nrr).toFixed(4)}</td>
                </tr>
            `).join('');
        }

        async function loadPointsTable() {
            try {
                const selectedBasis = runrateModeSelect.value === 'overs' ? 'overs' : 'balls';
                const basisLabel = selectedBasis === 'overs' ? 'Overs' : 'Balls';
                basisBadge.textContent = `NRR Basis: Runs / ${basisLabel}`;
                nrrColHead.textContent = `NRR (${basisLabel})`;
                setStatus('Loading points table from Neon...');
                const response = await fetch(`http://localhost:3000/api/points-table?runRateBasis=${selectedBasis}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to load points table');
                }

                renderRows(Array.isArray(data.rows) ? data.rows : []);
                const msg = data.basisUsed === 'overs'
                    ? 'Sorted by Points, then NRR using runs divided by overs bowled/faced.'
                    : 'Sorted by Points, then NRR using runs divided by balls bowled/faced.';
                setStatus(msg);
            } catch (error) {
                setStatus(error.message || 'Unable to load points table.', true);
                pointsBody.innerHTML = '<tr><td colspan="13">Error loading data.</td></tr>';
            }
        }

        runrateModeSelect.addEventListener('change', loadPointsTable);
        loadPointsTable();
    </script>
</body>
</html>
